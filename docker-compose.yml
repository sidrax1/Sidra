version: "3.9"

name: sidra

services:
  sidra:
    container_name: sidra-app

    build:
      context: .
      dockerfile: Dockerfile

    image: sidra:latest

    restart: unless-stopped

    ports:
      - "3000:3000"

    env_file:
      - .env.local

    environment:
      NODE_ENV: production
      PORT: 3000

    networks:
      - sidra-network

    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

networks:
  sidra-network:
    driver: bridge
